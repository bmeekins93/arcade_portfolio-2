<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brian's Arcade Portfolio</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <link rel="stylesheet" href="src/lobby/lobby.css" />
</head>

<body>
  <div id="game-container">
    <div id="hud">WASD / Arrows: move • E / Space: interact • Enter: launch • Esc: close</div>
    <div id="scanlines" aria-hidden="true"></div>
    <div id="ui-layer">
      <div id="ui-modal" class="crt">
        <button id="modal-close" aria-label="Close modal">X</button>
        <div id="modal-title">PROJECT ACCESS</div>
        <div id="modal-content">Loading data...</div>
        <div id="modal-actions">
          <a id="modal-open" href="#" target="_blank" rel="noopener noreferrer">Launch</a>
        </div>
        <div id="modal-hint">[E/SPACE: INTERACT • ENTER: LAUNCH • ESC: CLOSE]</div>
      </div>
    </div>

    <!-- TOUCH CONTROLS -->
    <div id="touch-controls" aria-hidden="true">
      <div id="joystick-base">
        <div id="joystick-knob"></div>
      </div>
      <button id="action-button" type="button" aria-label="Interact">A</button>
    </div>

    <!-- ROTATE OVERLAY -->
    <div id="rotate-overlay" aria-live="polite">ROTATE DEVICE TO LANDSCAPE</div>

    <!-- EMBED OVERLAY -->
    <div id="game-embed-overlay">
      <div id="embed-controls">
        <span id="embed-title">RUNNING: UNKNOWN</span>
        <button id="close-embed-btn">RETURN TO ARCADE (ESC)</button>
      </div>
      <iframe id="embed-iframe" src=""></iframe>
    </div>
  </div>

  <script src="src/lobby/lobby.js"></script>
</body>

</html>
